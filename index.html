// ═══ FUNÇÕES ═══
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});

  window.scrollTo({top:0,behavior:'smooth'});

function selSeg(el,seg){
  state.seg=seg;

function iniciarQuiz(){

  state.empresa=document.getElementById('f-empresa').value.trim()||'Meu Negócio';
  state.whatsapp=document.getElementById('f-whatsapp').value.trim();
  state.email=document.getElementById('f-email').value.trim();

  if(!state.email){alert('Por favor informe seu e-mail.');return;}
  if(!state.seg){alert('Por favor selecione seu segmento.');return;}
  state.qIdx=0; state.respostas={};
  showScreen('quiz'); renderQ();
}

function renderQ(){
  var total=PERGUNTAS.length;
  var pct=Math.round((state.qIdx/total)*100);
  document.getElementById('prog-text').textContent='Pergunta '+(state.qIdx+1)+' de '+total;

  document.getElementById('prog-fill').style.width=pct+'%';

  // Update pilar chips
  var pAtual=PERGUNTAS[state.qIdx].pilar;
  for(var i=0;i<4;i++){
    var chip=document.getElementById('pc-'+i);
    chip.classList.remove('done','active');
    if(i<pAtual) chip.classList.add('done');
    else if(i===pAtual) chip.classList.add('active');
  }

  var pi=PILARES_INFO[p.pilar];
  var optsHTML='';
  p.opts.forEach(function(o,i){
    optsHTML+='<div class="option" onclick="pickOpt('+i+','+o.p+')" id="opt-'+i+'">'+
      '<div class="opt-letter">'+o.l+'</div>'+
      '<div class="opt-text">'+o.t+'</div>'+
    '</div>';
  });

  document.getElementById('q-area').innerHTML=
    '<div class="card" style="animation:fadeUp .4s ease both">'+
      '<div class="pilar-header" style="background:linear-gradient(135deg,'+pi.cor+'18,'+pi.cor+'08);border:1px solid '+pi.cor+'30">'+

        '<button class="btn btn-primary" id="btn-next" disabled onclick="nextQ()">'+
          (state.qIdx===total-1?'Gerar Diagnóstico 🎯':'Próxima →')+
        '</button>'+
      '</div>'+
    '</div>';

  if(state.respostas[state.qIdx]!==undefined){
    var ri=state.respostas[state.qIdx].idx;
    document.getElementById('opt-'+ri).classList.add('selected');
    document.getElementById('btn-next').disabled=false;
  }
}

function pickOpt(idx,pts){
  state.respostas[state.qIdx]={idx:idx,pts:pts,pilar:PERGUNTAS[state.qIdx].pilar};
  document.querySelectorAll('.option').forEach(function(o,i){
    o.classList.toggle('selected',i===idx);
  });
  document.getElementById('btn-next').disabled=false;
}

function nextQ(){
  if(state.qIdx<PERGUNTAS.length-1){state.qIdx++;renderQ();}
  else gerarDiagnostico();
}
function prevQ(){if(state.qIdx>0){state.qIdx--;renderQ();}}

function gerarDiagnostico(){
  showScreen('loading');
  var msgs=['Calculando seu score...','Identificando seu perfil de maturidade...','Mapeando GAPs e oportunidades...','Gerando seu plano de ação personalizado...'];
  var m=0;
  var iv=setInterval(function(){
    if(++m<msgs.length) document.getElementById('loading-text').textContent=msgs[m];
    else{clearInterval(iv); buildResult();}
  },700);
}

function calcScores(){
  var totalPts=0;
  var pilarPts=[0,0,0,0];
  var pilarCount=[0,0,0,0];
  Object.values(state.respostas).forEach(function(r){
    totalPts+=r.pts;
    pilarPts[r.pilar]+=r.pts;
    pilarCount[r.pilar]++;
  });
  // Score 0-100: max 5 pts x 20 questions = 100
  var score100=totalPts;
  // Each pilar: max 25 pts -> scale to 0-100
  var pilarScores=pilarPts.map(function(p,i){
    return Math.round((p/Math.max(pilarCount[i]*5,1))*100);
  });
  return {score:score100, pilarScores:pilarScores, pilarPts:pilarPts};
}

function getPerfil(score){
  return PERFIS.find(function(p){return score>=p.min&&score<=p.max;})||PERFIS[3];
}

function buildResult(){
  var calc=calcScores();
  var score=calc.score;
  var pilarScores=calc.pilarScores;
  state._score=score;

  var perfil=getPerfil(score);
  var potencial=Math.min(100,score+Math.floor(Math.random()*8)+12);
  var gap=potencial-score;
  var evolucao=Math.round((gap/Math.max(score,1))*100);

  // Top 3 oportunidades (pilares mais fracos)
  var sorted=PILARES_INFO.map(function(p,i){return{p:p,score:pilarScores[i],i:i};})
    .sort(function(a,b){return a.score-b.score;});
  var top3=sorted.slice(0,3);

  // Save lead
  salvarLead({
    nome:state.nome, empresa:state.empresa,
    whatsapp:state.whatsapp, email:state.email,
    segmento:state.seg, score:score,
    perfil:perfil.nome, pilarScores:pilarScores,
    potencial:potencial
  });

  var wrap=document.getElementById('report-wrap');
  wrap.innerHTML=buildReportHTML(score,perfil,pilarScores,potencial,gap,evolucao,top3);
  showScreen('result');

  // Animate score ring
  setTimeout(function(){
    var fill=document.getElementById('ring-fg');
    if(fill) fill.style.strokeDashoffset=345-(345*(score/100));
    var c=0;var iv=setInterval(function(){
      c=Math.min(c+2,score);
      var el=document.getElementById('score-anim');
      if(el)el.textContent=c;
      if(c>=score)clearInterval(iv);
    },18);
    // Build radar chart
    buildRadarChart(pilarScores);
    // Animate bars
    setTimeout(function(){
      document.querySelectorAll('.rbar-fill').forEach(function(el){el.style.width=el.dataset.w+'%';});
      document.querySelectorAll('.pot-bar-fill').forEach(function(el){el.style.width=el.dataset.w+'%';});
    },300);
  },150);
}

function buildRadarChart(pilarScores){
  var ctx=document.getElementById('radar-chart');
  if(!ctx) return;
  new Chart(ctx,{
    type:'radar',
    data:{
      labels:PILARES_INFO.map(function(p){return p.nome;}),
      datasets:[{
        label:'Seu Score',
        data:pilarScores,
        backgroundColor:'rgba(108,99,255,.2)',
        borderColor:'rgba(108,99,255,.8)',
        borderWidth:2,
        pointBackgroundColor:PILARES_INFO.map(function(p){return p.cor;}),
        pointRadius:5,
      }]
    },
    options:{
      responsive:false,
      scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:'rgba(255,255,255,.06)'},pointLabels:{color:'#a0a8d8',font:{family:'DM Sans',size:12}}}},
      plugins:{legend:{display:false}},
      elements:{line:{tension:.3}}
    }
  });
}

function agendar(){
  var SEU_WPP='5535987096476';
  var msg=encodeURIComponent('Olá! Fiz o diagnóstico LUME e quero saber mais sobre a Metodologia.\n\nNegócio: '+state.empresa+'\nScore: '+state._score+'/100\nPerfil: '+getPerfil(state._score).nome);
  window.open('https://wa.me/'+SEU_WPP+'?text='+msg,'_blank');
}

function restart(){
  state={nome:'',empresa:'',whatsapp:'',email:'',seg:null,qIdx:0,respostas:{},_score:0};
  document.querySelectorAll('#seg-grid .seg-btn').forEach(function(b){b.classList.remove('active');});
  ['f-nome','f-empresa','f-whatsapp','f-email'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  showScreen('intro');
}

function salvarLead(d){
  // Google Sheets
  var SHEETS_URL='https://script.google.com/macros/s/AKfycbyHWaN1ds2ekbq4lgXAbZ67qT9AygbtPanlgSV5lvF4JfKN-Yr5hH9FX3zIH_1xz32eUQ/exec';
  if(SHEETS_URL){
    fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(e){console.warn('Sheets:',e);});
  }
  // localStorage para LUME Panel
  try{
    var leads=JSON.parse(localStorage.getItem('lume_leads')||'[]');
    var exists=leads.findIndex(function(l){return l.email===d.email||l.whatsapp===d.whatsapp;});
    var lead={
      id:exists>=0?leads[exists].id:'lead_'+Date.now(),
      nome:d.nome, empresa:d.empresa,
      email:d.email, whatsapp:d.whatsapp,
      nicho:d.segmento, score:d.score,
      perfil:d.perfil, potencial:d.potencial,
      eixos:{'Clareza':d.pilarScores[0],'Estrutura':d.pilarScores[1],'Experiência':d.pilarScores[2],'Evolução':d.pilarScores[3]},
      date:new Date().toISOString(),
      status:'pending', activationToken:null
    };
    if(exists>=0){leads[exists]=lead;}else{leads.push(lead);}
    localStorage.setItem('lume_leads',JSON.stringify(leads));
  }catch(e){console.warn('localStorage:',e);}
}
</script>
